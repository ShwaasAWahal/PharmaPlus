version: "3.9"

services:
  api:
    build: .
    container_name: pharmacy_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://pharmacy_user:pharmacy_pass@db:5432/pharmacy_db
      - FLASK_ENV=production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pharmacy_db
    environment:
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_pass
      POSTGRES_DB: pharmacy_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacy_user -d pharmacy_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Redis for Celery (uncomment if using Celery for background tasks)
  # redis:
  #   image: redis:7-alpine
  #   container_name: pharmacy_redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  pg_data:
